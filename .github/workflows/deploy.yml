name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: japan2026/package-lock.json
      - name: Copy shared data (replace symlinks)
        run: |
          rm -f japan2026/src/data/tripData.js japan2026/src/data/nearbyFinds.js japan2026/src/data/savedPlaces.js japan2026/src/data/coords.js japan2026/src/data/mapConfig.js
          cp shared/data/tripData.js japan2026/src/data/tripData.js
          cp shared/data/nearbyFinds.js japan2026/src/data/nearbyFinds.js
          cp shared/data/savedPlaces.js japan2026/src/data/savedPlaces.js
          cp shared/data/coords.js japan2026/src/data/coords.js
          cp shared/data/mapConfig.js japan2026/src/data/mapConfig.js
      - name: Install dependencies
        run: npm ci
        working-directory: japan2026
      - name: Build
        run: npm run build
        working-directory: japan2026
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: japan2026/dist
      - id: deployment
        uses: actions/deploy-pages@v4
