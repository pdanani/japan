name: EAS Update

on:
  push:
    branches: [main]
    paths:
      - 'japan2026-mobile/**'
      - 'shared/**'
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message'
        required: false
        default: 'Manual publish'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: japan2026-mobile/package-lock.json

      - name: Install dependencies
        working-directory: japan2026-mobile
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        working-directory: japan2026-mobile
        run: eas update --branch preview --message "${{ github.event.inputs.message || github.event.head_commit.message || 'Auto publish' }}" --non-interactive
